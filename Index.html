<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Cyber Boxing v4.0 - Ultimate Striker</title>
    
    <!-- Library AI Mo-Cap -->
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/pose/pose.js" crossorigin="anonymous"></script>

    <style>
        body { margin: 0; background: #02040a; color: white; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; overflow: hidden; }
        
        #gameContainer { display: flex; flex-direction: column; gap: 15px; background: #0b0f19; padding: 20px; border-radius: 20px; box-shadow: 0 0 50px rgba(0, 242, 254, 0.2); border: 1px solid #1e293b; max-width: 100%; width: 460px; align-items: center; position: relative; }
        
        canvas { background: radial-gradient(circle at center, #111827 0%, #000000 100%); border-radius: 15px; max-width: 100%; }
        #gameCanvas { border: 3px solid #38bdf8; box-shadow: 0 0 25px rgba(56, 189, 248, 0.4); width: 100%; height: auto; }
        #camCanvas { border: 2px solid #a855f7; border-radius: 10px; width: 140px; height: 105px; position: absolute; bottom: 35px; right: 35px; opacity: 0.8; transform: scaleX(-1); box-shadow: 0 0 15px rgba(168, 85, 247, 0.5); }
        
        .ui-panel { width: 100%; display: flex; flex-direction: column; gap: 10px; }
        
        /* Health & Super Bars */
        .bar-container { background: #111; border: 2px solid #333; height: 22px; border-radius: 12px; overflow: hidden; position: relative; box-shadow: inset 0 0 10px rgba(0,0,0,0.8); }
        .bar-fill { height: 100%; transition: width 0.1s ease-out; }
        .bar-text { position: absolute; width: 100%; text-align: center; line-height: 22px; font-size: 12px; font-weight: 800; color: #fff; text-shadow: 1px 1px 2px #000; letter-spacing: 1px; }
        
        #enemyHealth { background: linear-gradient(90deg, #991b1b, #ef4444); }
        #playerHealth { background: linear-gradient(90deg, #047857, #10b981); }
        #playerSuper { background: linear-gradient(90deg, #4c1d95, #a855f7); width: 0%; transition: width 0.3s ease-out;}

        #videoInput { display: none; }
        .glowing-text { text-shadow: 0 0 10px currentColor; }
    </style>
</head>
<body>

    <div id="gameContainer">
        <div class="ui-panel">
            <div style="display: flex; justify-content: space-between; align-items: flex-end;">
                <div style="font-size: 16px; font-weight: 900; color: #f43f5e;" class="glowing-text">CYBER-BOT MK.IV</div>
                <div style="font-size: 12px; color: #9ca3af;">K.O: <span id="koVal" style="color: #fff; font-weight: bold;">0</span></div>
            </div>
            
            <div class="bar-container">
                <div id="enemyHealth" class="bar-fill" style="width: 100%;"></div>
                <div class="bar-text">HP <span id="enemyHpVal">100</span>%</div>
            </div>

            <div style="font-size: 16px; font-weight: 900; color: #10b981; margin-top: 5px;" class="glowing-text">PLAYER (YOU)</div>
            <div class="bar-container">
                <div id="playerHealth" class="bar-fill" style="width: 100%;"></div>
                <div class="bar-text">HP <span id="playerHpVal">100</span>%</div>
            </div>
            <!-- SUPER METER BARU -->
            <div class="bar-container" style="height: 16px; border-color: #4c1d95; margin-top: -5px;">
                <div id="playerSuper" class="bar-fill"></div>
                <div class="bar-text" style="line-height: 16px; font-size: 10px; color: #e9d5ff;">SUPER METER <span id="superVal">0</span>%</div>
            </div>
        </div>

        <canvas id="gameCanvas" width="460" height="460"></canvas>
        <canvas id="camCanvas"></canvas>
        <video id="videoInput" autoplay playsinline muted></video>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');

        // Game States
        let koCount = 0; let gameOver = false;
        let playerHp = 100; let enemyHp = 100; 
        let playerSuper = 0; // SUPER METER (0-100)
        let comboCount = 0;
        let screenShake = 0;

        // Player Actions
        let leftHandTarget = { x: 130, y: 350 }, rightHandTarget = { x: 330, y: 350 };
        let leftHandSmooth = { x: 130, y: 350 }, rightHandSmooth = { x: 330, y: 350 };
        let isParrying = false; let playerDodge = 'NONE'; 
        let leftHandExtended = false; let rightHandExtended = false;

        // AI Robot Pattern System
        let enemyAction = 'IDLE'; 
        let targetArea = 'HEAD'; // HEAD, BODY
        let enemyTimer = 0;
        let attackSpeed = 60; // Kecepatan ancang-ancang
        
        let combatTexts = [];
        let particles = [];

        function addSuper(amount) {
            if (playerSuper < 100) {
                playerSuper += amount;
                if (playerSuper >= 100) {
                    playerSuper = 100;
                    spawnText('🔥 ULTIMATE READY! 🔥', '#a855f7', 230, 100, 40);
                }
            }
        }

        function spawnParticles(x, y, color, isHeavy = false) {
            let count = isHeavy ? 30 : 12;
            for (let i = 0; i < count; i++) {
                particles.push({
                    x: x, y: y, 
                    vx: (Math.random() - 0.5) * (isHeavy ? 15 : 8), 
                    vy: (Math.random() - 0.5) * (isHeavy ? 15 : 8),
                    radius: Math.random() * (isHeavy ? 6 : 4) + 2, 
                    alpha: 1, color: color
                });
            }
        }

        function spawnText(text, color, x, y, size = 24) {
            combatTexts.push({ text: text, color: color, x: x, y: y, size: size, life: 40, vy: -1 });
        }

        function updateGame() {
            if (gameOver) return;
            if (screenShake > 0) screenShake *= 0.85;

            // Smoother hand tracking
            leftHandSmooth.x += (leftHandTarget.x - leftHandSmooth.x) * 0.3;
            leftHandSmooth.y += (leftHandTarget.y - leftHandSmooth.y) * 0.3;
            rightHandSmooth.x += (rightHandTarget.x - rightHandSmooth.x) * 0.3;
            rightHandSmooth.y += (rightHandTarget.y - rightHandSmooth.y) * 0.3;

            // Update Particles & Texts
            particles.forEach((p, i) => { p.x += p.vx; p.y += p.vy; p.alpha -= 0.04; if (p.alpha <= 0) particles.splice(i, 1); });
            combatTexts.forEach((t, i) => { t.y += t.vy; t.life--; if (t.life <= 0) combatTexts.splice(i, 1); });

            // --- AI ROBOT LOGIC ---
            enemyTimer++;
            if (enemyAction === 'IDLE') {
                if (enemyTimer > (Math.random() * 40 + 30)) {
                    enemyAction = 'TELEGRAPH'; enemyTimer = 0;
                    targetArea = Math.random() > 0.5 ? 'HEAD' : 'BODY';
                }
            } 
            else if (enemyAction === 'TELEGRAPH') {
                if (enemyTimer > attackSpeed) {
                    enemyAction = 'ATTACK'; enemyTimer = 0;
                    
                    // --- DEFENSE CHECK ---
                    if (targetArea === 'HEAD' && playerDodge !== 'NONE') {
                        spawnText('🏃 DODGE!', '#10b981', 230, 200);
                        addSuper(15);
                    } 
                    else if (isParrying) {
                        spawnText('🛡️ PARRY!', '#38bdf8', 230, 200);
                        enemyHp -= 5; // Reflect minor damage
                        addSuper(20);
                        spawnParticles(230, 200, '#38bdf8');
                        screenShake = 5;
                    } 
                    else {
                        // KENA HIT!
                        comboCount = 0; // Reset kombo
                        let dmg = targetArea === 'HEAD' ? 15 : 10;
                        playerHp -= dmg;
                        screenShake = 15;
                        spawnText(`💥 HIT -${dmg}`, '#ef4444', 230, 250, 30);
                        spawnParticles(230, 230, '#ef4444', true);
                        if (playerHp <= 0) { playerHp = 0; gameOver = true; }
                    }
                }
            } else if (enemyAction === 'ATTACK' || enemyAction === 'HURT') {
                if (enemyTimer > 15) { enemyAction = 'IDLE'; enemyTimer = 0; }
            }

            // Sync UI
            document.getElementById('enemyHealth').style.width = Math.max(0, enemyHp) + "%";
            document.getElementById('enemyHpVal').innerText = Math.max(0, enemyHp);
            document.getElementById('playerHealth').style.width = Math.max(0, playerHp) + "%";
            document.getElementById('playerHpVal').innerText = Math.max(0, playerHp);
            document.getElementById('playerSuper').style.width = playerSuper + "%";
            document.getElementById('superVal').innerText = playerSuper;
        }

        function drawGame() {
            ctx.save();
            if (screenShake > 1) ctx.translate((Math.random() - 0.5) * screenShake, (Math.random() - 0.5) * screenShake);

            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // Lantai Ring Neon
            ctx.fillStyle = '#060913'; ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.strokeStyle = '#1e293b'; ctx.lineWidth = 2;
            for(let i=0; i<5; i++) { ctx.beginPath(); ctx.moveTo(0, 250 + i*50); ctx.lineTo(460, 250 + i*50); ctx.stroke(); }

            // RENDER ROBOT
            let rColor = '#00f2fe';
            if (enemyAction === 'TELEGRAPH') rColor = '#f59e0b';
            if (enemyAction === 'ATTACK') rColor = '#ef4444';
            if (enemyAction === 'HURT') rColor = '#ffffff';

            ctx.lineWidth = 4; ctx.strokeStyle = rColor; ctx.shadowColor = rColor; ctx.shadowBlur = enemyAction !== 'IDLE' ? 20 : 5;
            
            // Kepala Robot
            ctx.strokeRect(190, 60, 80, 80);
            ctx.fillStyle = '#000'; ctx.fillRect(192, 62, 76, 76);
            // Mata Robot
            ctx.fillStyle = rColor; ctx.fillRect(205, 80, 15, 10); ctx.fillRect(240, 80, 15, 10);

            // Badan Robot
            ctx.strokeRect(150, 150, 160, 120);
            ctx.fillStyle = '#000'; ctx.fillRect(152, 152, 156, 116);

            // Target Indicator (Ngasih tau robot mau nyerang mana)
            if (enemyAction === 'TELEGRAPH') {
                ctx.fillStyle = 'rgba(245, 158, 11, 0.3)';
                if (targetArea === 'HEAD') ctx.fillRect(180, 50, 100, 100);
                else ctx.fillRect(140, 140, 180, 140);
                
                ctx.fillStyle = '#f59e0b'; ctx.font = 'bold 16px Arial'; ctx.textAlign = 'center';
                ctx.fillText(`⚠️ TARGET: ${targetArea}`, 230, targetArea === 'HEAD' ? 40 : 130);
            }

            // Tangan Serang Robot
            if (enemyAction === 'ATTACK') {
                let yPos = targetArea === 'HEAD' ? 100 : 200;
                ctx.fillStyle = '#ef4444'; ctx.fillRect(100, yPos, 60, 60); ctx.fillRect(300, yPos, 60, 60);
            }
            ctx.shadowBlur = 0;

            // RENDER DEFENSE PLAYER
            if (isParrying) {
                ctx.fillStyle = 'rgba(56, 189, 248, 0.2)';
                ctx.beginPath(); ctx.moveTo(230, 50); ctx.lineTo(350, 120); ctx.lineTo(350, 300); ctx.lineTo(230, 380); ctx.lineTo(110, 300); ctx.lineTo(110, 120); ctx.fill();
                ctx.strokeStyle = '#38bdf8'; ctx.lineWidth = 3; ctx.stroke();
            }

            // RENDER TANGAN PLAYER (GLOVES)
            let isUltimate = playerSuper >= 100;
            function drawGlove(x, y, isRight) {
                let gColor = isUltimate ? '#a855f7' : (isRight ? '#ec4899' : '#38bdf8');
                ctx.fillStyle = gColor; ctx.shadowColor = gColor; ctx.shadowBlur = isUltimate ? 30 : 15;
                ctx.beginPath(); ctx.ellipse(x, y, 35, 45, isRight ? 0.2 : -0.2, 0, Math.PI * 2); ctx.fill();
                ctx.fillStyle = '#fff'; ctx.shadowBlur = 0;
                ctx.beginPath(); ctx.ellipse(x + (isRight?8:-8), y - 10, 12, 20, isRight?0.2:-0.2, 0, Math.PI*2); ctx.fill();
            }
            drawGlove(leftHandSmooth.x, leftHandSmooth.y, false);
            drawGlove(rightHandSmooth.x, rightHandSmooth.y, true);

            // Particles & Text
            particles.forEach(p => { ctx.fillStyle = p.color; ctx.globalAlpha = p.alpha; ctx.beginPath(); ctx.arc(p.x, p.y, p.radius, 0, Math.PI*2); ctx.fill(); });
            ctx.globalAlpha = 1;

            combatTexts.forEach(t => {
                ctx.fillStyle = t.color; ctx.font = `bold ${t.size}px Arial`; ctx.textAlign = 'center';
                ctx.shadowColor = '#000'; ctx.shadowBlur = 5; ctx.fillText(t.text, t.x, t.y); ctx.shadowBlur = 0;
            });

            if (gameOver) {
                ctx.fillStyle = 'rgba(0,0,0,0.85)'; ctx.fillRect(0, 0, canvas.width, canvas.height);
                ctx.fillStyle = '#ef4444'; ctx.font = 'bold 36px Arial'; ctx.textAlign = 'center'; ctx.fillText('K.O!', 230, 200);
                ctx.fillStyle = '#fff'; ctx.font = '16px Arial'; ctx.fillText('Angkat tangan kiri ke atas untuk RESTART', 230, 240);
            }
            ctx.restore();
        }

        // FUNGSI PUKULAN & SKILL
        function executePunch(side, handX, handY) {
            if (gameOver || enemyAction === 'TELEGRAPH') return;
            
            let isUltimate = playerSuper >= 100;
            let dmg = isUltimate ? 35 : 8; // Damage Normal vs Ultimate
            
            enemyHp -= dmg;
            enemyAction = 'HURT'; enemyTimer = 0;
            comboCount++;
            
            if (isUltimate) {
                playerSuper = 0; // Reset Super
                screenShake = 20;
                spawnText('🌌 CYBER SMASH!! -' + dmg, '#a855f7', 230, 150, 36);
                spawnParticles(230, 150, '#a855f7', true);
            } else {
                addSuper(10); // Tambah super tiap mukul biasa
                spawnText(`${comboCount}x COMBO!`, '#fcd34d', 230, handY - 50, Math.min(20 + comboCount*2, 40));
                spawnParticles(handX, handY - 100, side === 'LEFT' ? '#38bdf8' : '#ec4899');
            }

            if (enemyHp <= 0) {
                koCount++; document.getElementById('koVal').innerText = koCount;
                enemyHp = 100; playerHp = Math.min(100, playerHp + 20); // Heal dikit pas menang
                comboCount = 0;
                spawnText('🔥 ROBOT DESTROYED! 🔥', '#f59e0b', 230, 200, 30);
                attackSpeed = Math.max(20, attackSpeed - 5); // Makin lama makin susah!
            }
        }

        function resetGame() {
            koCount = 0; document.getElementById('koVal').innerText = 0;
            playerHp = 100; enemyHp = 100; playerSuper = 0; comboCount = 0;
            enemyAction = 'IDLE'; gameOver = false; attackSpeed = 60;
        }

        // --- SENSOR MO-CAP ---
        const videoElement = document.getElementById('videoInput');
        const pose = new Pose({ locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/pose/${file}` });
        pose.setOptions({ modelComplexity: 0, smoothLandmarks: true, minDetectionConfidence: 0.5, minTrackingConfidence: 0.5 });

        pose.onResults((results) => {
            const camCanvas = document.getElementById('camCanvas');
            const camCtx = camCanvas.getContext('2d');
            camCtx.clearRect(0, 0, camCanvas.width, camCanvas.height);
            camCtx.drawImage(results.image, 0, 0, camCanvas.width, camCanvas.height);

            if (results.poseLandmarks) {
                const points = results.poseLandmarks;
                const shoulderL = points[11]; const shoulderR = points[12];
                const wristL = points[15]; const wristR = points[16];

                leftHandTarget.x = (1 - wristL.x) * canvas.width; leftHandTarget.y = wristL.y * canvas.height;
                rightHandTarget.x = (1 - wristR.x) * canvas.width; rightHandTarget.y = wristR.y * canvas.height;

                // DETEKSI DODGE (Bahu miring signifikan)
                const shoulderDiff = shoulderL.y - shoulderR.y;
                if (shoulderDiff > 0.15) playerDodge = 'RIGHT';
                else if (shoulderDiff < -0.15) playerDodge = 'LEFT';
                else playerDodge = 'NONE';

                // DETEKSI PARRY (Tangan Rapat di atas perut)
                if (wristL.y < shoulderL.y + 0.15 && wristR.y < shoulderR.y + 0.15 && Math.abs(wristL.x - wristR.x) < 0.20) {
                    isParrying = true;
                } else {
                    isParrying = false;
                }

                // EKSEKUSI PUKULAN
                if (!isParrying && !gameOver) {
                    if (leftHandTarget.y < 250 && Math.abs(leftHandTarget.x - canvas.width/2) < 150) {
                        if (!leftHandExtended) { executePunch('LEFT', leftHandTarget.x, leftHandTarget.y); leftHandExtended = true; }
                    } else if (leftHandTarget.y > 300) { leftHandExtended = false; }

                    if (rightHandTarget.y < 250 && Math.abs(rightHandTarget.x - canvas.width/2) < 150) {
                        if (!rightHandExtended) { executePunch('RIGHT', rightHandTarget.x, rightHandTarget.y); rightHandExtended = true; }
                    } else if (rightHandTarget.y > 300) { rightHandExtended = false; }
                }

                // RESTART GESTURE
                if (gameOver && wristL.y < points[0].y - 0.2) resetGame();

                // Draw Skeleton in mini-map
                points.forEach(lm => {
                    camCtx.fillStyle = '#a855f7'; camCtx.beginPath(); camCtx.arc(lm.x * camCanvas.width, lm.y * camCanvas.height, 2, 0, Math.PI*2); camCtx.fill();
                });
            }
        });

        const camera = new Camera(videoElement, { onFrame: async () => { await pose.send({ image: videoElement }); }, width: 320, height: 240 });
        camera.start();

        function gameLoop() { updateGame(); drawGame(); requestAnimationFrame(gameLoop); }
        gameLoop();
    </script>
</body>
  </html>
